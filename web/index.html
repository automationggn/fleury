<!doctype html>
<html lang="en">
<head>
  <script>
    window.APP_CONFIG = {
      API_BASE: "https://fleury-test-nodejs-01.azurewebsites.net"
    };
  </script>

  <meta charset="utf-8" />
  <title>TOTP Self‑Service Enrollment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg-page: #f3f4f6;
      --bg-card: #ffffff;
      --border: #e5e7eb;
      --text-main: #111827;
      --text-muted: #6b7280;
      --primary: #2563eb;

      --success-bg: #ecfdf5;
      --success-text: #047857;
      --warn-bg: #fffbeb;
      --warn-text: #b45309;
      --err-bg: #fef2f2;
      --err-text: #b91c1c;
    }

    body {
      margin: 0;
      background: var(--bg-page);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text-main);
    }

    .app {
      max-width: 760px;
      margin: 26px auto;
      padding: 0 16px 40px;
    }

    /* Header bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .orgLabel {
      font-size: 13px;
      font-weight: 600;
      background: #fff;
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .titleblock h1 {
      margin: 0 0 6px 0;
      font-size: 28px;
      letter-spacing: -0.2px;
    }

    .titleblock p {
      margin: 0;
      color: var(--text-muted);
    }

    /* Avatar menu */
    .userMenu {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .authPill {
      font-size: 12px;
      color: var(--text-muted);
      background: #fff;
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .avatarBtn {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }

    .avatarCircle {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 14px;
    }

    .dropdown {
      position: absolute;
      top: 48px;
      right: 0;
      width: 280px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
      padding: 10px;
      display: none;
      z-index: 20;
    }

    .dropdown.open { display: block; }

    .ddHeader {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 8px;
    }

    .ddEmail {
      font-weight: 600;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }

    .ddMuted {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .ddDivider {
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    .ddItem {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 10px;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text-main);
      font-weight: 500;
    }

    .ddItem:hover { background: #f9fafb; }

    .ddIcon {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      background: #f3f4f6;
      display: grid;
      place-items: center;
      font-size: 14px;
    }

    /* Cards */
    h2 { margin: 0; font-size: 18px; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }

    .row {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .muted { color: var(--text-muted); }

    button {
      padding: 9px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      font-weight: 500;
    }

    button.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(37,99,235,0.35);
    }

    input {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      width: 160px;
      font-size: 16px;
      text-align: center;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    .ok, .warn, .err {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: 500;
    }

    .ok { background: var(--success-bg); color: var(--success-text); }
    .warn { background: var(--warn-bg); color: var(--warn-text); }
    .err { background: var(--err-bg); color: var(--err-text); }

    img.qr {
      width: 220px;
      height: 220px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
    }

    pre {
      background: #f9fafb;
      padding: 10px;
      border-radius: 10px;
      font-size: 12px;
      overflow-x: auto;
    }

    a { color: var(--primary); font-weight: 500; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>

<body>
  <div class="app">

    <!-- TOP BAR -->
    <div class="topbar">
      <span id="orgLabel" class="orgLabel">—</span>

      <div class="userMenu">
        <span id="authState" class="authPill">Checking…</span>

        <button id="avatarBtn" class="avatarBtn">
          <div id="avatarCircle" class="avatarCircle">?</div>
        </button>

        <div id="userDropdown" class="dropdown">
          <div class="ddHeader">
            <div class="avatarCircle" id="avatarCircleMini" style="width:34px;height:34px;">?</div>
            <div>
              <div class="ddEmail" id="ddEmail">—</div>
              <div class="ddMuted">Signed in via Azure Static Web Apps</div>
            </div>
          </div>

          <div class="ddDivider"></div>

          <a class="ddItem" id="msProfileLink" href="https://myaccount.microsoft.com/" target="_blank">
            <div class="ddIcon">👤</div>
            <div>Open Microsoft profile</div>
          </a>

          <a class="ddItem" id="logoutLink" href="/.auth/logout">
            <div class="ddIcon">🚪</div>
            <div>Logout</div>
          </a>

          <div class="ddDivider"></div>

          <a class="ddItem" id="loginLink" href="/.auth/login/aad" style="display:none">
            <div class="ddIcon">🔐</div>
            <div>Login</div>
          </a>
        </div>
      </div>
    </div>

    <!-- (REST OF YOUR PAGE: unchanged cards and logic) -->

  </div>

<script>
  const API = window.APP_CONFIG.API_BASE;

  function emailToAlnumKey(email) {
    return (email || "").toLowerCase().replace(/[^a-z0-9]/g, "");
  }

  function orgFromEmail(email) {
    if (!email) return "—";
    const at = email.indexOf("@");
    const dot = email.indexOf(".com", at);
    if (at === -1 || dot === -1) return "—";
    return email.substring(at + 1, dot);
  }

  async function getUserInfo() {
    const res = await fetch("/.auth/me");
    const data = await res.json();
    return data.clientPrincipal || null;
  }

  function initialsFromEmail(email) {
    if (!email) return "?";
    const left = email.split("@")[0];
    return (left[0] + (left[1] || "")).toUpperCase();
  }

  function setAuthUI(user) {
    const isAuthed = !!user;
    const email = user?.userDetails || "";

    document.getElementById("authState").textContent =
      isAuthed ? "Authenticated" : "Anonymous";

    document.getElementById("orgLabel").textContent =
      isAuthed ? orgFromEmail(email) : "—";

    document.getElementById("ddEmail").textContent =
      isAuthed ? email : "Not signed in";

    const ini = isAuthed ? initialsFromEmail(email) : "?";
    document.getElementById("avatarCircle").textContent = ini;
    document.getElementById("avatarCircleMini").textContent = ini;

    document.getElementById("loginLink").style.display = isAuthed ? "none" : "flex";
    document.getElementById("logoutLink").style.display = isAuthed ? "flex" : "none";
  }

  const avatarBtn = document.getElementById("avatarBtn");
  const userDropdown = document.getElementById("userDropdown");

  avatarBtn.onclick = (e) => {
    e.stopPropagation();
    userDropdown.classList.toggle("open");
  };

  document.addEventListener("click", () => userDropdown.classList.remove("open"));

  (async () => {
    const user = await getUserInfo();
    setAuthUI(user);
  })();
</script>

</body>
</html>
